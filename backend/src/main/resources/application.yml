spring:
  application:
    name: opsdesk-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/opsdesk}
    username: ${SPRING_DATASOURCE_USERNAME:opsdesk}
    password: ${SPRING_DATASOURCE_PASSWORD:opsdesk}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

security:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-1234567890}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
